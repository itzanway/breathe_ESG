[phases.setup]
nixPkgs = ["python312", "nodejs_20", "nodePackages.npm"]

[phases.build]
cmds = [
  "cd frontend && npm install && npm run build",
  "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput"
]

[start]
cmd = "cd backend && python manage.py migrate && python seed_data.py && gunicorn core.wsgi --bind 0.0.0.0:$PORT --workers 2"